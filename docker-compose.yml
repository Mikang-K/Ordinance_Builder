services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: ordinance_builder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d ordinance_builder"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.23
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol (app connection)
    environment:
      NEO4J_AUTH: neo4j/pNfKXbDPVSToXRcWNWDtRSAiuv8TI0g7ILImlIMBSwc
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker 서비스 이름으로 호스트 오버라이드
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_URL: postgresql://app_user:localpass@postgres:5432/ordinance_builder
      FIREBASE_CREDENTIALS_PATH: /app/firebase-service-account.json
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
